<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PawPost AI - 30 days of social media captions for your pet business in 60 seconds. Built for groomers, walkers, trainers & sitters." />
    <title>PawPost AI - Social Media Captions for Pet Businesses</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1C1917" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PawPost AI" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72x72.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="PawPost AI - Social Media Captions for Pet Businesses" />
    <meta property="og:description" content="30 days of social media captions for your pet business, generated in 60 seconds." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pawpost.ca" />
    <meta property="og:image" content="https://pawpost.ca/icons/icon-512x512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PawPost AI" />
    <meta name="twitter:description" content="30 days of social media captions for your pet business, generated in 60 seconds." />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VVYBRDVRHK"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VVYBRDVRHK');
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400;1,9..144,600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>

    <!-- Service Worker: clear old caches first, then register -->
    <script>
      if ('serviceWorker' in navigator) {
        // Force clear any stale caches immediately
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name) })
          })
        }
        window.addEventListener('load', function() {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) { reg.unregister() })
          }).then(function() {
            navigator.serviceWorker.register('/sw.js')
              .then(function(reg) { console.log('🐾 PawPost SW registered') })
              .catch(function(err) { console.log('SW failed:', err) })
          })
        })
      }
    </script>
  </body>
</html>
